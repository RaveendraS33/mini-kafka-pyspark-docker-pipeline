services:
  kafka:
    image: apache/kafka:latest
    container_name: docker-pipeline-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-init:
    image: apache/kafka:latest
    container_name: docker-pipeline-kafka-init
    depends_on:
      - kafka
    command:
      [
        "/bin/bash",
        "-c",
        "sleep 15 && /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic transactions --partitions 1 --replication-factor 1"
      ]

  spark:
    build:
      context: .
      dockerfile: spark_jobs/Dockerfile
    container_name: docker-pipeline-spark
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./output:/app/output
    environment:
      HOME: /tmp
      SPARK_HOME: /opt/spark
      SPARK_SUBMIT_OPTS: "-Duser.home=/tmp -Divy.home=/tmp/.ivy2.5.2"
    command:
      [
        "/bin/bash",
        "-c",
        "sleep 20 && /opt/spark/bin/spark-submit --conf spark.jars.ivy=/tmp/.ivy2.5.2 --packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.1 spark_jobs/streaming_cleaning_job.py"
      ]

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: docker-pipeline-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command:
      [
        "python",
        "producer/producer_kafka.py",
        "--bootstrap-servers",
        "kafka:9092"
      ]
